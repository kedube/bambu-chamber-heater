#
# Main entrypoint for the unified chamber heater configuration.
# Keep the shared logic in packages/controller_shared.yaml and only switch
# the temperature-unit and device packages here as needed.
#

globals:
  - id: fan_low_rpm_since_ms
    type: uint32_t
    restore_value: no
    initial_value: "0"
  - id: status_led_mode
    type: int
    restore_value: no
    initial_value: "-1"

script:
  - id: check_fan_failure
    mode: restart
    then:
      - lambda: |-
          bool boot_ready = id(boot_complete);
          if (!boot_ready || id(emergency_stop).state) {
            id(fan_low_rpm_since_ms) = 0;
            return;
          }

          if (!id(printer_is_actively_printing).state) {
            id(fan_low_rpm_since_ms) = 0;
            return;
          }

          const float rpm = id(fan_rpm).state;
          if (isnan(rpm) || id(controller_status).state != "Active") {
            id(fan_low_rpm_since_ms) = 0;
            return;
          }

          if (rpm < ${fan_min_rpm}) {
            if (id(fan_low_rpm_since_ms) == 0) {
              id(fan_low_rpm_since_ms) = millis();
              return;
            }

            if ((millis() - id(fan_low_rpm_since_ms)) >=
                (${fan_fail_timeout_seconds}UL * 1000UL)) {
              id(fan_low_rpm_since_ms) = 0;
              ESP_LOGE(
                  "safety",
                  "EMERGENCY: Fan RPM %.0f below minimum %s for at least %s seconds while heater is active",
                  rpm,
                  "${fan_min_rpm}",
                  "${fan_fail_timeout_seconds}");
              id(trigger_emergency_stop)->execute();
            }
          } else {
            id(fan_low_rpm_since_ms) = 0;
          }

  - id: update_status_led
    mode: restart
    then:
      - lambda: |-
          if (!id(boot_complete)) {
            return;
          }

          StatusLedMode next_led_mode = compute_status_led_mode(
              id(emergency_stop).state,
              wifi::global_wifi_component->is_connected(),
              id(current_temperature).state,
              ${overtemp_led_warning_threshold},
              id(controller_status).state);
          float red = 0.0f;
          float green = 1.0f;
          float blue = 0.0f;
          float brightness = 0.3f;
          const char *effect = "None";

          auto call = id(status_led).turn_on();

          if (next_led_mode == STATUS_LED_EMERGENCY_STOP) {
            red = 1.0f;
            green = 0.0f;
            blue = 0.0f;
            brightness = 1.0f;
          } else if (next_led_mode == STATUS_LED_WIFI_DISCONNECTED) {
            red = 0.0f;
            green = 0.0f;
            blue = 1.0f;
            brightness = 0.75f;
            effect = "Fast Pulse";
          } else if (next_led_mode == STATUS_LED_OVERTEMP_WARNING) {
            effect = "Error Strobe";
          } else if (next_led_mode == STATUS_LED_HEATER_ACTIVE) {
            red = 1.0f;
            green = 0.5f;
            blue = 0.0f;
            brightness = 0.75f;
            effect = "Slow Pulse";
          }

          if (id(status_led_mode) == static_cast<int>(next_led_mode)) {
            return;
          }

          id(status_led_mode) = static_cast<int>(next_led_mode);
          call.set_rgb(red, green, blue);
          call.set_brightness(brightness);
          call.set_effect(effect);
          call.perform();

esp32:
  board: esp32-c6-devkitc-1
  flash_size: 8MB
  variant: esp32c6
  cpu_frequency: 160MHz
  framework:
    type: esp-idf
    version: latest
    advanced:
      enable_ota_rollback: true

esphome:
  includes:
    - ../include/status_led_helper.h
    - ../include/wifi_protocol_helper.h

light:
  - platform: esp32_rmt_led_strip
    id: status_led
    name: Status LED
    pin:
      number: ${status_led_pin}
      ignore_strapping_warning: true
    rgb_order: RGB
    num_leds: 1
    chipset: ws2812
    restore_mode: ALWAYS_OFF
    effects:
      - pulse:
          name: "Slow Pulse"
          transition_length: 1s
          update_interval: 1s
      - pulse:
          name: "Fast Pulse"
          transition_length: 0.5s
          update_interval: 0.5s
      - strobe:
          name: "Error Strobe"
          colors:
            - state: true
              brightness: 100%
              red: 100%
              green: 0%
              blue: 0%
              duration: 500ms
            - state: false
              duration: 500ms
    internal: true
    icon: "mdi:led-on"
    web_server:
      sorting_group_id: sorting_group_system

wifi:
  on_connect:
    - script.execute: update_status_led
  on_disconnect:
    - script.execute: update_status_led

sensor:
  - platform: pulse_counter
    pin:
      number: ${fan_rpm_pin}
      mode:
        input: true
        pullup: false
    name: "Fan Speed"
    id: fan_rpm
    unit_of_measurement: "RPM"
    accuracy_decimals: 0
    update_interval: 5s
    count_mode:
      rising_edge: DISABLE
      falling_edge: INCREMENT
    internal_filter: 13us
    filters:
      - multiply: 0.5
    on_value:
      then:
        - script.execute: check_fan_failure
    icon: "mdi:fan"
    web_server:
      sorting_group_id: sorting_group_sensors

text_sensor:
  - platform: template
    name: "WIFI Protocol"
    entity_category: diagnostic
    id: wifi_protocol
    icon: "mdi:wifi-cog"
    lambda: |-
      return get_negotiated_wifi_protocol();
    update_interval: 300s
    web_server:
      sorting_group_id: sorting_group_diagnostic

interval:
  - interval: 60s
    then:
      - script.execute: update_status_led
