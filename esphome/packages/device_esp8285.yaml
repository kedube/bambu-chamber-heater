#
# Main entrypoint for the unified chamber heater configuration.
# Keep the shared logic in packages/controller_shared.yaml and only switch
# the temperature-unit and device packages here as needed.
#

script:
  - id: check_fan_failure
    mode: restart
    then:
      - lambda: |-
          return;

  - id: update_status_led
    mode: restart
    then:
      - lambda: |-
          return;

esp8266:
  board: esp8285
  restore_from_flash: true
  framework:
    version: latest

status_led:
  pin:
    number: ${status_led_pin}
    inverted: true
