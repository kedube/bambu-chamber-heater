globals:
  # Filament type aliases - maps Bambu filament names to preset names
  - id: filament_type_map
    type: std::map<std::string, std::string>
    restore_value: no
    initial_value: |-
      {
        {"PLA", "PLA"}, {"PLA SILK", "PLA"}, {"PLA+", "PLA"}, {"PLA-CF", "PLA"},
        {"MATTE PLA", "PLA"}, {"PLA HIGH SPEED", "PLA"},
        {"TPU", "TPU"}, {"TPU 95A", "TPU"}, {"TPU 85A HF", "TPU"},
        {"PETG", "PETG"}, {"PETG HF", "PETG"}, {"PETG-CF", "PETG"},
        {"PETG-RCF", "PETG"}, {"PETG-ESD", "PETG"},
        {"PCTG", "PCTG"},
        {"ABS", "ABS"}, {"ABS-GF", "ABS"},
        {"ASA", "ASA"}, {"ASA-CF", "ASA"}, {"ASA-AERO", "ASA"},
        {"PC", "PC"}, {"PC FR", "PC"},
        {"PET", "PET"}, {"PET-CF", "PET"},
        {"PA", "PA"}, {"PA-CF", "PA"},
        {"PA6", "PA6"}, {"PA6-GF", "PA6"}, {"PA6-CF", "PA6"},
        {"PA12", "PA12"}, {"PA12-CF", "PA12"},
        {"PA612", "PA612"}, {"PA612-CF", "PA612"},
        {"PPA-GF", "PPA"}, {"PPA-CF", "PPA"},
        {"PP", "PP"}, {"PP-GF", "PP"}, {"PP-CF", "PP"},
        {"PPS", "PPS"}, {"PPS-CF", "PPS"},
        {"PE", "PE"}, {"PE-CF", "PE"},
        {"PAHT-CF", "PAHT"}
      }
  - id: restart_confirmed
    type: bool
    restore_value: no
    initial_value: "false"
  - id: modbus_debugging
    type: bool
    restore_value: no
    initial_value: "false"
  - id: last_temp_update_ms
    type: uint32_t
    restore_value: no
    initial_value: "0"
  - id: comms_fault_latched
    type: bool
    restore_value: no
    initial_value: "false"
  - id: has_last_valid_temp
    type: bool
    restore_value: no
    initial_value: "false"
  - id: last_valid_temp
    type: float
    restore_value: no
    initial_value: "0.0"
  - id: last_temp_sample_ms
    type: uint32_t
    restore_value: no
    initial_value: "0"
  - id: emergency_stop_timestamp
    type: unsigned long
    restore_value: no
    initial_value: "0"
  - id: boot_complete
    type: bool
    restore_value: no
    initial_value: "false"
  - id: api_connection
    type: bool
    restore_value: no
    initial_value: "false"
  - id: home_assistant_api_client_count
    type: int
    restore_value: no
    initial_value: "0"
  - id: emergency_stop_fault
    type: bool
    restore_value: no
    initial_value: "false"
  - id: emergency_stop_manual_clear_pending
    type: bool
    restore_value: no
    initial_value: "false"
  - id: last_controller_status_logged
    type: std::string
    restore_value: no
    initial_value: '"__init__"'
  - id: last_temperature_unit_logged
    type: std::string
    restore_value: no
    initial_value: '"__init__"'
  - id: last_controller_mode_logged
    type: std::string
    restore_value: no
    initial_value: '"__init__"'

script:
  - id: write_temp_unit
    mode: queued
    then:
      - if:
          condition:
            lambda: |-
              return id(temperature_unit).state != "${temp_unit}";
          then:
            - select.set:
                id: set_temperature_unit
                option: "${temp_unit}"
  - id: restart_confirm_timeout
    mode: restart
    then:
      - delay: 10s
      - if:
          condition:
            lambda: "return id(restart_confirmed);"
          then:
            - logger.log:
                format: "Restart confirmation timed out"
                level: INFO
            - switch.turn_off: restart_confirmation
  - id: trigger_emergency_stop
    mode: restart
    then:
      - if:
          condition:
            lambda: |-
              return !id(emergency_stop).state;
          then:
            - lambda: |-
                id(emergency_stop_fault) = true;
                ESP_LOGE("safety", "EMERGENCY: Triggering Emergency Stop");
            - switch.turn_on: emergency_stop_internal
  - id: check_bambu_printer_online
    mode: restart
    then:
      - if:
          condition:
            lambda: |-
              bool boot_ready = id(boot_complete);
              bool api_ready = id(api_connection);
              bool printer_state_ready = id(printer_status_raw).has_state();
              if (!boot_ready || !api_ready || !printer_state_ready) {
                return false;
              }

              const std::string &printer_state = id(printer_status_raw).state;
              return printer_state == "off";
          then:
            - lambda: |-
                ESP_LOGE("safety", "EMERGENCY: Bambu printer is offline");
                id(trigger_emergency_stop)->execute();
  - id: auto_select_filament_preset
    mode: restart
    then:
      - lambda: |-
          const std::string &filament_raw = id(bambu_filament_type).state;

          std::string filament_upper;
          filament_upper.reserve(filament_raw.length());
          std::transform(
              filament_raw.begin(),
              filament_raw.end(),
              std::back_inserter(filament_upper),
              [](unsigned char c) { return std::toupper(c); });

          auto type_it = id(filament_type_map).find(filament_upper);

          if (type_it != id(filament_type_map).end()) {
            if (std::string(id(filament_temp_preset).current_option()) == type_it->second) {
              ESP_LOGD(
                  "bambu",
                  "Chamber temperature preset already set to %s (%s filament)",
                  type_it->second.c_str(),
                  filament_raw.c_str());
              return;
            }

            auto call = id(filament_temp_preset).make_call();
            call.set_option(type_it->second);
            call.perform();

            ESP_LOGI(
                "bambu",
                "Auto-set chamber temperature preset to %s (%s filament)",
                type_it->second.c_str(),
                filament_raw.c_str());
          } else {
            ESP_LOGW(
                "bambu",
                "Unknown filament type: %s - keeping current preset",
                filament_raw.c_str());
          }
  - id: maybe_auto_select_filament_preset
    mode: restart
    then:
      - lambda: |-
          if (!id(bambu_printer_status).has_state() || !id(bambu_filament_type).has_state()) {
            return;
          }

          if (id(printer_is_actively_printing).state) {
            id(auto_select_filament_preset)->execute();
          }

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  comment: ${device_description}
  area: ${device_area}
  on_boot:
    priority: 200
    then:
      - switch.turn_on: emergency_stop_internal
      - script.execute: write_temp_unit
      - delay: ${emergency_check_delay}
      - lambda: |-
          id(boot_complete) = true;
          ESP_LOGI("boot", "Boot complete - emergency stop checks now active");
      - script.execute: maybe_auto_select_filament_preset
      - script.execute: update_status_led
  platformio_options:
    build_flags:
      - -Os
      - -DNDEBUG

api:
  encryption:
    key: !secret encryption_key
  on_client_connected:
    then:
      - lambda: |-
          std::string client_name = client_info;
          std::transform(
              client_name.begin(),
              client_name.end(),
              client_name.begin(),
              [](unsigned char c) { return std::tolower(c); });

          const bool is_home_assistant =
              client_name.find("home assistant") != std::string::npos;
          const bool is_esphome_logs =
              client_name.find("esphome logs") != std::string::npos;

          if (is_home_assistant) {
            id(home_assistant_api_client_count)++;
            id(api_connection) = true;
            ESP_LOGI(
                "api",
                "Home Assistant API client connected: %s (%s)",
                client_info.c_str(),
                client_address.c_str());
            id(check_bambu_printer_online)->execute();
            id(maybe_auto_select_filament_preset)->execute();
          } else if (is_esphome_logs) {
            ESP_LOGI(
                "api",
                "ESPHome log client connected: %s (%s)",
                client_info.c_str(),
                client_address.c_str());
          } else {
            ESP_LOGI(
                "api",
                "Non-Home-Assistant API client connected: %s (%s)",
                client_info.c_str(),
                client_address.c_str());
          }
  on_client_disconnected:
    then:
      - lambda: |-
          std::string client_name = client_info;
          std::transform(
              client_name.begin(),
              client_name.end(),
              client_name.begin(),
              [](unsigned char c) { return std::tolower(c); });

          const bool is_home_assistant =
              client_name.find("home assistant") != std::string::npos;
          const bool is_esphome_logs =
              client_name.find("esphome logs") != std::string::npos;

          if (is_home_assistant) {
            if (id(home_assistant_api_client_count) > 0) {
              id(home_assistant_api_client_count)--;
            }

            if (id(home_assistant_api_client_count) == 0 && id(api_connection)) {
              id(api_connection) = false;
              ESP_LOGE(
                  "safety",
                  "EMERGENCY: Home Assistant API connection lost (%s)",
                  client_address.c_str());
              id(trigger_emergency_stop)->execute();
            }
            ESP_LOGI(
                "api",
                "Home Assistant API client disconnected: %s (%s)",
                client_info.c_str(),
                client_address.c_str());
            return;
          }

          if (is_esphome_logs) {
            ESP_LOGI(
                "api",
                "ESPHome log client disconnected: %s (%s)",
                client_info.c_str(),
                client_address.c_str());
            return;
          }

          ESP_LOGI(
              "api",
              "Non-Home-Assistant API client disconnected: %s (%s)",
              client_info.c_str(),
              client_address.c_str());

logger:
  level: DEBUG
  baud_rate: 0

ota:
  - platform: esphome
    password: !secret ota_password
  - platform: web_server

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  min_auth_mode: WPA2
  power_save_mode: none
  fast_connect: on
  ap:
    ssid: !secret ap_wifi_ssid
    password: !secret ap_wifi_password
  #manual_ip:
  #  static_ip: !secret static_ip
  #  gateway: !secret gateway
  #  subnet: !secret subnet
  #  dns1: !secret dns1
  #  dns2: !secret dns2

captive_portal:

modbus:
  send_wait_time: 1s
  uart_id: uart_bus
  disable_crc: false
  role: client
  id: modbus1

modbus_controller:
  - id: modbus_device
    address: ${modbus_slave_address}
    modbus_id: modbus1
    setup_priority: -10
    update_interval: ${modbus_update_interval}
    command_throttle: 200ms

sensor:
  - platform: modbus_controller
    modbus_controller_id: modbus_device
    name: "Delay Time Remaining"
    device_class: duration
    state_class: measurement
    address: 0x0002
    register_type: holding
    value_type: U_WORD
    unit_of_measurement: "s"
    id: delay_time_remaining
    icon: "mdi:timer-outline"
    web_server:
      sorting_group_id: sorting_group_sensors

  - platform: modbus_controller
    modbus_controller_id: modbus_device
    name: "Current Temp"
    device_class: temperature
    state_class: measurement
    address: 0x0003
    register_type: holding
    value_type: S_WORD
    unit_of_measurement: "${temp_unit_label}"
    accuracy_decimals: 1
    filters:
      - multiply: ${temp_multiplier}
    on_value:
      then:
        - lambda: |-
            uint32_t now = millis();
            bool emergency_active = id(emergency_stop).state;
            bool boot_ready = id(boot_complete);
            id(last_temp_update_ms) = now;
            id(comms_fault_latched) = false;

            if (id(has_last_valid_temp) && id(last_temp_sample_ms) != 0) {
              uint32_t elapsed_ms = now - id(last_temp_sample_ms);
              float temp_delta = x - id(last_valid_temp);
              float time_delta_sec = elapsed_ms / 1000.0f;

              if (time_delta_sec > 0.0f) {
                float temp_rate = temp_delta / time_delta_sec;

                if (boot_ready && id(over_temp_shutoff).state &&
                    temp_rate > ${max_temp_rise_rate}) {
                  if (!emergency_active) {
                    ESP_LOGE(
                        "safety",
                        "EMERGENCY: Temperature rising too fast: %.2f%s/s (max: ${max_temp_rise_rate}%s/s)",
                        temp_rate,
                        "${temp_unit_label}",
                        "${temp_unit_label}");
                    id(trigger_emergency_stop)->execute();
                  }
                }
              }
            }
            id(last_temp_sample_ms) = now;
            id(last_valid_temp) = x;
            id(has_last_valid_temp) = true;
        - if:
            condition:
              lambda: |-
                bool boot_ready = id(boot_complete);
                return boot_ready &&
                       id(over_temp_shutoff).state &&
                       !isnan(id(high_temp_alarm).state) &&
                       x > id(high_temp_alarm).state &&
                       !id(emergency_stop).state;
            then:
              - lambda: |-
                  ESP_LOGE(
                      "safety",
                      "EMERGENCY: Temperature %.1f%s exceeds High Temperature Alarm: %.1f%s",
                      id(current_temperature).state,
                      "${temp_unit_label}",
                      id(high_temp_alarm).state,
                      "${temp_unit_label}");
                  id(trigger_emergency_stop)->execute();
        - if:
            condition:
              lambda: |-
                bool boot_ready = id(boot_complete);
                return boot_ready &&
                       id(over_temp_shutoff).state &&
                       !isnan(id(low_temp_alarm).state) &&
                       id(controller_status).state == "Active" &&
                       x < id(low_temp_alarm).state &&
                       !id(emergency_stop).state;
            then:
              - lambda: |-
                  ESP_LOGE(
                      "safety",
                      "EMERGENCY: Temperature %.1f%s below Low Temperature Alarm: %.1f%s (possible sensor failure)",
                      id(current_temperature).state,
                      "${temp_unit_label}",
                      id(low_temp_alarm).state,
                      "${temp_unit_label}");
                  id(trigger_emergency_stop)->execute();
        - script.execute: update_status_led
    id: current_temperature
    icon: "mdi:thermometer"
    web_server:
      sorting_group_id: sorting_group_sensors

  - platform: wifi_signal
    name: "WIFI Signal Strength"
    device_class: signal_strength
    state_class: measurement
    unit_of_measurement: "dBm"
    update_interval: 60s
    id: wifi_signal_strength
    icon: "mdi:wifi-strength-3"
    web_server:
      sorting_group_id: sorting_group_diagnostic

binary_sensor:
  - platform: modbus_controller
    modbus_controller_id: modbus_device
    name: "Alarm Active"
    address: 0x000C
    register_type: holding
    on_press:
      then:
        - logger.log:
            format: "Warning temperature alarm triggered!"
            level: WARN
    id: alarm_active
    icon: "mdi:alarm-bell"
    web_server:
      sorting_group_id: sorting_group_sensors

  - platform: template
    name: "Printer Is Actively Printing"
    id: printer_is_actively_printing
    internal: true
    lambda: |-
      if (!id(bambu_printer_status).has_state()) {
        return false;
      }

      const std::string &status = id(bambu_printer_status).state;
      return status == "running" || status == "prepare" || status == "slicing";

text_sensor:
  - platform: homeassistant
    id: printer_status_raw
    entity_id: binary_sensor.${bambu_printer_entity_id}_online
    internal: true
    on_value:
      then:
        - script.execute: check_bambu_printer_online
        - component.update: printer_status

  - platform: template
    name: "Printer Status"
    entity_category: diagnostic
    id: printer_status
    internal: false
    icon: "mdi:printer-3d"
    lambda: |-
      if (!id(bambu_printer_status).has_state()) {
        return std::string("Unknown");
      }

      std::string state = id(bambu_printer_status).state;
      if (!state.empty()) {
        state[0] = std::toupper(static_cast<unsigned char>(state[0]));
      }
      return state;
    update_interval: never
    web_server:
      sorting_group_id: sorting_group_diagnostic

  - platform: modbus_controller
    modbus_controller_id: modbus_device
    name: "Controller Status"
    address: 0x0000
    register_type: holding
    register_count: 1
    response_size: 2
    raw_encode: HEXBYTES
    id: controller_status
    icon: "mdi:thermostat"
    lambda: |-
      uint16_t v = modbus_controller::word_from_hex_str(x, 0);
      if (v == 0) return std::string("Stopped");
      if (v == 1) return std::string("Active");
      return std::string("Unknown");
    on_value:
      then:
        - lambda: |-
            if (x != id(last_controller_status_logged)) {
              id(last_controller_status_logged) = x;
              if (x == "Stopped") {
                ESP_LOGI("heater", "Chamber heater stopped");
              } else if (x == "Active") {
                ESP_LOGI("heater", "Chamber heater active");
              } else {
                ESP_LOGW("heater", "Chamber heater status unknown");
              }
            }
        - script.execute: check_fan_failure
        - script.execute: update_status_led
    web_server:
      sorting_group_id: sorting_group_sensors

  - platform: modbus_controller
    modbus_controller_id: modbus_device
    name: "Temp Sensor Status"
    address: 0x0001
    register_type: holding
    register_count: 1
    response_size: 2
    raw_encode: HEXBYTES
    id: sensor_status
    icon: "mdi:information-outline"
    lambda: |-
      switch (modbus_controller::word_from_hex_str(x, 0)) {
        case 0: return std::string("Connected");
        case 1: return std::string("Disconnected");
        default: return std::string("Unknown");
      }
    on_value:
      then:
        - lambda: |-
            if (x != "Disconnected" || id(emergency_stop).state) return;
            ESP_LOGE("safety", "EMERGENCY: Temperature sensor disconnected");
            id(trigger_emergency_stop)->execute();
    web_server:
      sorting_group_id: sorting_group_sensors

  - platform: modbus_controller
    modbus_controller_id: modbus_device
    name: "Temp Unit"
    address: 0x0004
    register_type: holding
    register_count: 1
    response_size: 2
    raw_encode: HEXBYTES
    id: temperature_unit
    icon: "mdi:temperature-auto"
    lambda: |-
      uint16_t v = modbus_controller::word_from_hex_str(x, 0);
      if (v == 0) return std::string("Celsius");
      if (v == 1) return std::string("Fahrenheit");
      return std::string("Unknown");
    on_value:
      then:
        - lambda: |-
            if (x != id(last_temperature_unit_logged)) {
              id(last_temperature_unit_logged) = x;
              if (x == "Celsius") {
                ESP_LOGI("heater", "Chamber heater operating in Celsius");
              } else if (x == "Fahrenheit") {
                ESP_LOGI("heater", "Chamber heater operating in Fahrenheit");
              } else {
                ESP_LOGW("heater", "Chamber heater temperature unit unknown");
              }
            }
    web_server:
      sorting_group_id: sorting_group_sensors

  - platform: modbus_controller
    modbus_controller_id: modbus_device
    name: "Controller Mode"
    address: 0x0005
    register_type: holding
    register_count: 1
    response_size: 2
    raw_encode: HEXBYTES
    id: controller_mode
    icon: "mdi:thermostat-cog"
    lambda: |-
      uint16_t v = modbus_controller::word_from_hex_str(x, 0);
      if (v == 0) return std::string("Heating");
      if (v == 1) return std::string("Cooling");
      return std::string("Unknown");
    on_value:
      then:
        - lambda: |-
            if (x != id(last_controller_mode_logged)) {
              id(last_controller_mode_logged) = x;
              if (x == "Heating") {
                ESP_LOGI("heater", "Chamber heater operating in Heating mode");
              } else if (x == "Cooling") {
                ESP_LOGI("heater", "Chamber heater operating in Cooling mode");
              } else {
                ESP_LOGW("heater", "Chamber heater controller mode unknown");
              }
            }
    web_server:
      sorting_group_id: sorting_group_sensors

  - platform: version
    name: "Firmware Version"
    id: firmware_version
    hide_timestamp: true
    icon: "mdi:chip"
    web_server:
      sorting_group_id: sorting_group_diagnostic

  - platform: wifi_info
    ssid:
      name: "WIFI SSID"
      entity_category: diagnostic
      id: wifi_ssid
      icon: "mdi:wifi"
      web_server:
        sorting_group_id: sorting_group_diagnostic
    ip_address:
      name: "IP Address"
      entity_category: diagnostic
      id: ip_address
      icon: "mdi:ip"
      web_server:
        sorting_group_id: sorting_group_diagnostic

  - platform: template
    name: "Software Version"
    entity_category: diagnostic
    id: software_version
    icon: "mdi:information-variant"
    lambda: |-
      return std::string("${sw_version}");
    web_server:
      sorting_group_id: sorting_group_diagnostic

  - platform: uptime
    name: "System Uptime"
    format:
      separator: " "
    id: system_uptime
    icon: "mdi:clock-start"
    web_server:
      sorting_group_id: sorting_group_diagnostic

  - platform: template
    name: "Emergency Stop Time"
    entity_category: diagnostic
    id: emergency_stop_time_sensor
    icon: "mdi:clock-alert"
    lambda: |-
      if (id(emergency_stop_timestamp) == 0) {
        return std::string("Not Active");
      }
      unsigned long elapsed_sec = (millis() - id(emergency_stop_timestamp)) / 1000;

      unsigned long days = elapsed_sec / 86400;
      unsigned long hours = (elapsed_sec % 86400) / 3600;
      unsigned long minutes = (elapsed_sec % 3600) / 60;
      unsigned long seconds = elapsed_sec % 60;

      std::string result;
      if (days > 0) result += std::to_string(days) + "d ";
      if (hours > 0) result += std::to_string(hours) + "h ";
      if (minutes > 0) result += std::to_string(minutes) + "m ";
      if (seconds > 0 || elapsed_sec == 0) result += std::to_string(seconds) + "s ";
      result += "ago";

      return result;
    update_interval: 30s
    web_server:
      sorting_group_id: sorting_group_system

  - platform: homeassistant
    name: "Bambu Printer Status"
    entity_id: sensor.${bambu_printer_entity_id}_print_status
    entity_category: diagnostic
    id: bambu_printer_status
    internal: true
    icon: "mdi:printer-3d"
    on_value:
      then:
        - component.update: printer_status
        - lambda: |-
            if (x == "finish" || x == "failed" || x == "offline" || x == "idle") {
              if (std::string(id(filament_temp_preset).current_option()) != "Off") {
                auto call = id(filament_temp_preset).make_call();
                call.set_option("Off");
                call.perform();
                ESP_LOGI(
                    "bambu",
                    "Printer is not actively printing (%s), automatically turning off chamber heater",
                    x.c_str());
              }
            } else if (id(printer_is_actively_printing).state) {
              ESP_LOGI("bambu", "Print started, auto-selecting chamber temperature");
            }
        - script.execute: check_fan_failure
        - script.execute: maybe_auto_select_filament_preset

  - platform: homeassistant
    name: "Bambu Active Filament Type"
    entity_id: sensor.${bambu_printer_entity_id}_active_tray
    attribute: "type"
    entity_category: diagnostic
    id: bambu_filament_type
    on_value:
      then:
        - lambda: |-
            ESP_LOGI("bambu", "Active filament type changed to: %s", x.c_str());
        - script.execute: maybe_auto_select_filament_preset
    web_server:
      sorting_group_id: sorting_group_diagnostic

number:
  - platform: modbus_controller
    modbus_controller_id: modbus_device
    name: "Delay Start Time"
    address: 0x000A
    register_type: holding
    value_type: U_WORD
    unit_of_measurement: "s"
    min_value: 0
    max_value: 999
    step: 1
    mode: box
    entity_category: config
    id: delay_start_time
    icon: "mdi:timer-sand"
    web_server:
      sorting_group_id: sorting_group_settings

  - platform: modbus_controller
    modbus_controller_id: modbus_device
    name: "Modbus Address"
    address: 0x0012
    register_type: holding
    value_type: U_WORD
    min_value: 1
    max_value: 247
    step: 1
    mode: box
    entity_category: config
    id: modbus_slave_address
    icon: "mdi:hexadecimal"
    web_server:
      sorting_group_id: sorting_group_settings

  - platform: modbus_controller
    modbus_controller_id: modbus_device
    name: "Backlight Level"
    address: 0x0015
    register_type: holding
    value_type: U_WORD
    min_value: 0
    max_value: 7
    step: 1
    mode: box
    entity_category: config
    id: backlight_level
    icon: "mdi:lightbulb"
    internal: ${hide_backlight_setting}
    web_server:
      sorting_group_id: sorting_group_settings

select:
  - platform: modbus_controller
    modbus_controller_id: modbus_device
    name: "Set Temperature Unit"
    address: 0x0004
    value_type: U_WORD
    use_write_multiple: false
    entity_category: config
    optionsmap:
      "Celsius": 0
      "Fahrenheit": 1
    id: set_temperature_unit
    icon: "mdi:temperature-auto"
    internal: true
    web_server:
      sorting_group_id: sorting_group_settings

  - platform: modbus_controller
    modbus_controller_id: modbus_device
    name: "Modbus Baudrate"
    address: 0x0013
    value_type: U_WORD
    use_write_multiple: false
    entity_category: config
    optionsmap:
      "9600": 0
      "14400": 1
      "19200": 2
      "38400": 3
      "56000": 4
      "57600": 5
      "115200": 6
    id: modbus_baudrate
    icon: "mdi:console"
    web_server:
      sorting_group_id: sorting_group_settings

  - platform: template
    name: "Filament Temp Preset"
    optimistic: true
    restore_value: true
    options:
      - "Off"
      - "PLA"
      - "TPU"
      - "PETG"
      - "PCTG"
      - "ABS"
      - "ASA"
      - "PC"
      - "PET"
      - "PA"
      - "PA6"
      - "PA12"
      - "PA612"
      - "PPA"
      - "PP"
      - "PPS"
      - "PE"
      - "PAHT"
      - "User-defined"
    initial_option: "User-defined"
    on_value:
      then:
        - lambda: |-
            if (x == "Off") {
              id(emergency_stop).turn_on();
              ESP_LOGI("preset", "Emergency stop activated");
              return;
            }

            if (x == "User-defined") {
              ESP_LOGI("preset", "User-defined mode selected");
              return;
            }

            auto it = id(filament_presets).find(x);
            if (it != id(filament_presets).end()) {
              float temp_start = it->second.first;
              float temp_stop = it->second.second;
              bool boot_ready = id(boot_complete);

              if (isnan(id(temp_threshold_start).state) ||
                  fabsf(id(temp_threshold_start).state - temp_start) > 0.05f) {
                auto call_start = id(temp_threshold_start).make_call();
                call_start.set_value(temp_start);
                call_start.perform();
              }

              if (isnan(id(temp_threshold_stop).state) ||
                  fabsf(id(temp_threshold_stop).state - temp_stop) > 0.05f) {
                auto call_stop = id(temp_threshold_stop).make_call();
                call_stop.set_value(temp_stop);
                call_stop.perform();
              }

              if (!boot_ready && id(emergency_stop).state == 1 && !id(emergency_stop_fault)) {
                ESP_LOGI(
                    "preset",
                    "Preserving emergency stop during boot for preset %s",
                    x.c_str());
              } else if (!boot_ready && !id(emergency_stop_fault)) {
                id(emergency_stop_internal).turn_on();
                ESP_LOGI(
                    "preset",
                    "Emergency stop activated during boot for preset %s",
                    x.c_str());
              } else if (id(emergency_stop).state == 1 && !id(emergency_stop_fault)) {
                id(emergency_stop_internal).turn_off();
                ESP_LOGI("preset", "Emergency stop deactivated");
              } else if (id(emergency_stop).state == 1) {
                ESP_LOGW(
                    "preset",
                    "Emergency stop remains active because it was triggered by a fault condition");
              }

              ESP_LOGI(
                  "preset",
                  "%s filament selected setting heating temperature range (%.1f${temp_unit_label} - %.1f${temp_unit_label})",
                  x.c_str(),
                  temp_start,
                  temp_stop);
            }
    entity_category: config
    id: filament_temp_preset
    icon: "mdi:thermometer-lines"
    web_server:
      sorting_group_id: sorting_group_settings

switch:
  - platform: modbus_controller
    modbus_controller_id: modbus_device
    name: "Alarm Sound"
    address: 0x000D
    register_type: holding
    use_write_multiple: false
    on_turn_on:
      then:
        - lambda: |-
            ESP_LOGI("switch", "Alarm sound enabled");
    on_turn_off:
      then:
        - lambda: |-
            ESP_LOGI("switch", "Alarm sound disabled");
    entity_category: config
    id: alarm_sound
    icon: "mdi:alarm-check"
    web_server:
      sorting_group_id: sorting_group_settings

  - platform: modbus_controller
    modbus_controller_id: modbus_device
    name: "High Temp Alarm"
    address: 0x000E
    register_type: holding
    use_write_multiple: false
    entity_category: config
    id: high_temp_alarm_enable
    icon: "mdi:temperature-alert"
    web_server:
      sorting_group_id: sorting_group_settings

  - platform: modbus_controller
    modbus_controller_id: modbus_device
    name: "Low Temp Alarm"
    address: 0x000F
    register_type: holding
    use_write_multiple: false
    entity_category: config
    id: low_temp_alarm_enable
    icon: "mdi:temperature-alert"
    web_server:
      sorting_group_id: sorting_group_settings

  - platform: modbus_controller
    modbus_controller_id: modbus_device
    name: "Delay Start"
    address: 0x0010
    register_type: holding
    use_write_multiple: false
    entity_category: config
    id: delay_start
    icon: "mdi:timer-check-outline"
    web_server:
      sorting_group_id: sorting_group_settings

  - platform: modbus_controller
    modbus_controller_id: modbus_device
    name: "Emergency Stop Internal"
    address: 0x0011
    register_type: holding
    use_write_multiple: false
    id: emergency_stop_internal
    internal: true
    icon: "mdi:car-brake-alert"
    on_turn_on:
      - lambda: |-
          id(emergency_stop_manual_clear_pending) = false;
          if (id(emergency_stop_timestamp) == 0) {
            id(emergency_stop_timestamp) = millis();
          }
          ESP_LOGI("switch", "Emergency stop enabled");
      - script.execute: update_status_led
    on_turn_off:
      - lambda: |-
          id(emergency_stop_timestamp) = 0;
          if (id(emergency_stop_manual_clear_pending)) {
            id(emergency_stop_fault) = false;
            id(emergency_stop_manual_clear_pending) = false;
          }
          ESP_LOGI("switch", "Emergency stop disabled");
      - script.execute: update_status_led
    web_server:
      sorting_group_id: sorting_group_system

  - platform: template
    name: "Emergency Stop"
    lambda: |-
      return id(emergency_stop_internal).state;
    turn_on_action:
      - switch.turn_on: emergency_stop_internal
    turn_off_action:
      - lambda: |-
          id(emergency_stop_manual_clear_pending) = true;
      - switch.turn_off: emergency_stop_internal
    id: emergency_stop
    icon: "mdi:car-brake-alert"
    web_server:
      sorting_group_id: sorting_group_system

  - platform: modbus_controller
    modbus_controller_id: modbus_device
    name: "Sleep"
    address: 0x0014
    register_type: holding
    use_write_multiple: false
    entity_category: config
    id: sleep_switch
    internal: ${hide_sleep_switch}
    icon: "mdi:power-sleep"
    web_server:
      sorting_group_id: sorting_group_settings

  - platform: template
    name: "Over Temp Shutoff"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    turn_on_action:
      then:
        - logger.log:
            format: "Over temp shutoff enabled"
            level: INFO
    turn_off_action:
      then:
        - logger.log:
            format: "Over temp shutoff disabled"
            level: INFO
    id: over_temp_shutoff
    icon: "mdi:car-brake-temperature"
    web_server:
      sorting_group_id: sorting_group_system

  - platform: template
    name: "Modbus Debugging"
    optimistic: true
    turn_on_action:
      then:
        - logger.set_level: DEBUG
        - lambda: |-
            id(modbus_debugging) = true;
            ESP_LOGI("switch", "Modbus Debugging enabled");
    turn_off_action:
      then:
        - logger.set_level: INFO
        - lambda: |-
            id(modbus_debugging) = false;
            ESP_LOGI("switch", "Modbus Debugging disabled");
    entity_category: config
    id: modbus_debugging_switch
    icon: "mdi:bug"
    web_server:
      sorting_group_id: sorting_group_settings

  - platform: template
    name: "Restart Confirmation"
    optimistic: true
    turn_on_action:
      - globals.set:
          id: restart_confirmed
          value: "true"
      - script.execute: restart_confirm_timeout
    turn_off_action:
      - script.stop: restart_confirm_timeout
      - globals.set:
          id: restart_confirmed
          value: "false"
    id: restart_confirmation
    icon: "mdi:shield-check-outline"
    web_server:
      sorting_group_id: sorting_group_system

button:
  - platform: template
    name: "Restart"
    id: restart_button
    on_press:
      - if:
          condition:
            lambda: "return id(restart_confirmed);"
          then:
            - logger.log:
                format: "Restarting device..."
                level: WARN
            - switch.turn_off: restart_confirmation
            - button.press: internal_restart
          else:
            - logger.log:
                format: "Restart denied: Click the restart confirmation switch first!"
                level: INFO
    icon: "mdi:restart"
    web_server:
      sorting_group_id: sorting_group_system

  - platform: restart
    name: "Internal Restart"
    id: internal_restart
    internal: true

interval:
  - interval: ${watchdog_interval}
    then:
      - if:
          condition:
            lambda: |-
              if (id(comms_fault_latched)) return false;
              if (id(last_temp_update_ms) == 0) return false;
              return (millis() - id(last_temp_update_ms)) > ${comms_timeout_ms}UL;
          then:
            - lambda: |-
                id(comms_fault_latched) = true;
                ESP_LOGE("safety", "EMERGENCY: No temperature updates received for >${comms_timeout_ms}ms");
                id(trigger_emergency_stop)->execute();

web_server:
  port: 80
  version: 3
  css_include: "../assets/web/webserver-v3.min.css"
  js_include: "../assets/web/pixel-stars.js"
#  js_include: "../assets/web/moving-particles.js"
#  js_include: "../assets/web/shooting-stars.js"
  auth:
    username: !secret web_server_username
    password: !secret web_server_password
  sorting_groups:
    - id: sorting_group_sensors
      name: "Sensors"
      sorting_weight: 1
    - id: sorting_group_settings
      name: "Settings"
      sorting_weight: 2
    - id: sorting_group_diagnostic
      name: "Diagnostic"
      sorting_weight: 3
    - id: sorting_group_system
      name: "System Management"
      sorting_weight: 4
